name: EAS Build

on:
  # Preview build: every push to main after CI passes
  push:
    branches: [main]

  # Production build: push a semver tag like v1.0.0
  push_tag:
    tags: ['v*.*.*']

  # Manual trigger for any profile on any branch
  workflow_dispatch:
    inputs:
      profile:
        description: EAS build profile
        required: true
        default: preview
        type: choice
        options: [development, preview, production]
      platform:
        description: Platform to build
        required: true
        default: all
        type: choice
        options: [all, ios, android]

jobs:
  eas-build:
    name: EAS Build (${{ github.event.inputs.profile || (startsWith(github.ref, 'refs/tags/') && 'production') || 'preview' }})
    runs-on: ubuntu-latest

    # Only run if CI passes (skip for manual dispatch — you know what you're doing)
    # Block production builds if secrets aren't set
    environment: ${{ (github.event.inputs.profile == 'production' || startsWith(github.ref, 'refs/tags/')) && 'production' || 'preview' }}

    defaults:
      run:
        working-directory: anchor/mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: anchor/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # ── Resolve build profile ──────────────────────────────────────────────
      - name: Resolve profile and platform
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "profile=${{ github.event.inputs.profile }}" >> $GITHUB_OUTPUT
            echo "platform=${{ github.event.inputs.platform }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "profile=production" >> $GITHUB_OUTPUT
            echo "platform=all" >> $GITHUB_OUTPUT
          else
            echo "profile=preview" >> $GITHUB_OUTPUT
            echo "platform=all" >> $GITHUB_OUTPUT
          fi

      - name: Materialize Android Firebase config
        if: ${{ steps.resolve.outputs.platform == 'android' || steps.resolve.outputs.platform == 'all' }}
        run: |
          if [ -z "${FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64}" ]; then
            echo "Missing FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64 secret" >&2
            exit 1
          fi
          echo "$FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64" | base64 --decode > google-services.json
        env:
          FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64: ${{ secrets.FIREBASE_ANDROID_GOOGLE_SERVICES_JSON_B64 }}

      # ── Build ──────────────────────────────────────────────────────────────
      - name: EAS Build
        run: |
          eas build \
            --profile ${{ steps.resolve.outputs.profile }} \
            --platform ${{ steps.resolve.outputs.platform }} \
            --non-interactive \
            --no-wait
        env:
          EXPO_PUBLIC_APP_ENV: ${{ steps.resolve.outputs.profile == 'production' && 'production' || 'staging' }}
          EXPO_PUBLIC_SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          EXPO_PUBLIC_SENTRY_TRACES_SAMPLE_RATE: ${{ steps.resolve.outputs.profile == 'production' && '0.2' || '1.0' }}
          EXPO_PUBLIC_SENTRY_PROFILES_SAMPLE_RATE: ${{ steps.resolve.outputs.profile == 'production' && '0.1' || '1.0' }}

  # ── Auto-submit to stores (production tag only) ────────────────────────────
  eas-submit:
    name: EAS Submit (production)
    runs-on: ubuntu-latest
    needs: eas-build
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production

    defaults:
      run:
        working-directory: anchor/mobile

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: anchor/mobile/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Submit (iOS)
        run: eas submit --platform ios --profile production --non-interactive --latest
        env:
          EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

      - name: EAS Submit (Android)
        run: eas submit --platform android --profile production --non-interactive --latest
